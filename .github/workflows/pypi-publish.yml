name: Publish Python package to Pypi
on:
  push:
    tags:  #only trigger action when tagged with release number, i.e v0.0.1     
      - 'v*'

defaults:
  run:
    shell: bash
    working-directory: ledger-models-python

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Materialize hierarchy.json mirrors
        # hierarchy.json lives once in source control at
        # ledger-models-protos/hierarchy.json. The Python wheel bundles
        # it from inside the package directory, so this step copies the
        # canonical into ledger-models-python/.../security/hierarchy.json
        # before `python setup.py sdist bdist_wheel` runs. See
        # registry-versioning.md.
        run: ./sync-hierarchy-mirrors.sh
        working-directory: .
      - name: Get git tag extension
        id: tag
        uses: dawidd6/action-get-tag@v1
      - name: Release details
        run: |
          echo Release tag ${{ steps.tag.outputs.tag }}
          TAG=${{ steps.tag.outputs.tag }}
          echo tag is ${TAG}
          VERSION=${TAG#v}
          echo version is ${VERSION}
          echo "release_version=${VERSION}" >> $GITHUB_ENV
      - name: Print Environment Variables
        run: env
      - name: Build & Publish
        run: |
          pwd

          BUILD_VERSION=${{ env.release_version }} python3 setup.py sdist bdist_wheel

          # v0.2.2 — verify the wheel actually bundles hierarchy.json
          # before twine upload. v0.2.1 shipped a broken wheel
          # (MANIFEST.in didn't list *.json) and consumers had to vendor
          # the file. Fail loudly on regression rather than re-shipping
          # a broken artifact.
          if ! unzip -l dist/*.whl | grep -q ' fintekkers/wrappers/models/security/hierarchy.json$'; then
              echo "ERROR: built wheel does not bundle hierarchy.json — refusing to publish."
              echo "       see ledger-models-protos/registry-versioning.md and"
              echo "       check-python-wheel-hierarchy.sh for the regression history."
              exit 1
          fi

          pip3 install twine

          twine upload -u __token__ -p "${{ secrets.PYPI_TOKEN }}" --repository pypi dist/*
