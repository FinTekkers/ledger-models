name: Publish JS package to NPMJS Packages
on:
  push:
    tags:  #only trigger action when tagged with release number, i.e v0.0.1     
      - 'v*'

defaults:
  run:
    shell: bash
    working-directory: ledger-models-javascript
    
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3
      - name: Materialize hierarchy.json mirrors
        # hierarchy.json lives once in source control at
        # ledger-models-protos/hierarchy.json. The npm package bundles
        # it from the package root, so this step copies the canonical
        # into ledger-models-javascript/hierarchy.json before
        # `npm publish` reads package.json's `files` glob. See
        # registry-versioning.md.
        run: ./sync-hierarchy-mirrors.sh
        working-directory: .
      # Setup .npmrc file to publish to GitHub Packages
      - uses: actions/setup-node@v3
        with:
          node-version: '16.x'
          registry-url: https://registry.npmjs.org/
      - name: Get git tag extension
        id: tag
        uses: dawidd6/action-get-tag@v1
      - name: Release details
        run: |
          echo Release tag ${{ steps.tag.outputs.tag }}
          TAG=${{ steps.tag.outputs.tag }}
          echo tag is ${TAG}
          VERSION=${TAG#v}
          echo version is ${VERSION}
          echo "release_version=${VERSION}" >> $GITHUB_ENV
      - name: Print Environment Variables
        run: env
      - run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPMJS_PUBLISH_TOKEN }}" >> .npmrc
          npm ci
          echo ${{ env.release_version }} will be published to NPMJS Packages
          npm version ${{ env.release_version }} --allow-same-version
          npm publish  --access public