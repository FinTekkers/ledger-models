syntax = "proto3";

package fintekkers.models.security;

import "fintekkers/models/util/decimal_value.proto";
import "fintekkers/models/util/local_date.proto";
import "fintekkers/models/util/local_timestamp.proto";
import "fintekkers/models/util/uuid.proto";

import "fintekkers/models/security/identifier/identifier.proto";
import "fintekkers/models/security/bond/issuance.proto";
import "fintekkers/models/security/security_type.proto";
import "fintekkers/models/security/security_quantity_type.proto";
import "fintekkers/models/security/coupon_frequency.proto";
import "fintekkers/models/security/coupon_type.proto";
import "fintekkers/models/security/index/index_type.proto";

option java_multiple_files = true;

option java_outer_classname = "SecurityProtos";

message SecurityProto {
  string object_class = 1;
  string version = 2;

  //Primary Key
  fintekkers.models.util.UUIDProto uuid = 5;
  fintekkers.models.util.LocalTimestampProto as_of = 6;

  // When true, this message is a lightweight reference — only uuid is populated.
  // The caller must resolve the full entity by calling SecurityService.GetByIds
  // with this UUID. Used when embedding a SecurityProto inside another message
  // (e.g. PriceProto.security, TransactionProto.security) to avoid duplicating
  // the full security data. See docs/adr/is_link_pattern.md for details.
  bool is_link = 7;

  util.LocalTimestampProto valid_from = 8;
  util.LocalTimestampProto valid_to = 9;

  SecurityTypeProto security_type = 10;

  // Soft-delete tombstone. null/unset = active record; non-null = soft-deleted
  // at this timestamp. SecurityService.Search and GetByIds filter out tombstoned
  // records by default. Setting deleted_at via CreateOrUpdate is a soft-delete;
  // clearing it on a subsequent CreateOrUpdate resurrects the record.
  // See: https://github.com/FinTekkers/second-brain/issues/188
  fintekkers.models.util.LocalTimestampProto deleted_at = 15;

  //Biz fields
  string asset_class = 11;
  string issuer_name = 12;
  SecurityProto settlement_currency = 13;
  SecurityQuantityTypeProto quantity_type = 14;

  security.IdentifierProto identifier = 40;  // DEPRECATED: use identifiers
  string description = 41;

  // All known identifiers for this security. The primary identifier (used as
  // the human-readable ID) is the first entry. Secondary identifiers follow.
  // For Gilts, entry 0 will be {type=ISIN, value="GB..."}; for US Treasuries,
  // entry 0 will be {type=CUSIP, value="912828..."}.
  repeated security.IdentifierProto identifiers = 42;

  //Cash Security fields
  string cash_id = 50;

  //Equity Security fields

  //Bond Security fields
  fintekkers.models.util.DecimalValueProto coupon_rate = 60; // Expressed as a decimal fraction (0.05=5%, 0.0075=0.75%). Do NOT use percentage form (5.0 will be rejected).
  CouponTypeProto coupon_type = 61;
  CouponFrequencyProto coupon_frequency = 62;
  fintekkers.models.util.LocalDateProto dated_date = 63;
  fintekkers.models.util.DecimalValueProto face_value = 64;
  fintekkers.models.util.LocalDateProto issue_date = 65;
  fintekkers.models.util.LocalDateProto maturity_date = 66;
  repeated fintekkers.models.security.bond.IssuanceProto issuance_info = 67; //Issuance can be repeated as there may be re-openings of bond auctions (e.g. in US treasuries)

  //TIPS Bond fields
  fintekkers.models.util.DecimalValueProto base_cpi = 70; //Reference CPI at bond issuance (e.g. 256.394)
  fintekkers.models.util.LocalDateProto index_date = 71; //The date the base CPI was observed (e.g. the reference CPI date)
  fintekkers.models.security.index.IndexTypeProto inflation_index_type = 72; //Which inflation index this TIPS references (e.g. CPI_U)

  //FRN (Floating Rate Note) fields
  fintekkers.models.util.DecimalValueProto spread = 90; //Fixed spread over the reference rate, in basis points (e.g. 15 = +15bps)
  fintekkers.models.security.index.IndexTypeProto reference_rate_index = 91; //Which floating rate benchmark this FRN references (e.g. SOFR, T_BILL_13_WEEK)
  CouponFrequencyProto reset_frequency = 92; //How often the floating coupon rate resets

  //Index Security fields
  fintekkers.models.security.index.IndexTypeProto index_type = 80;

  // ============================================================================
  // oneof product_details — structured alternative to the flat fields above.
  //
  // During migration, BOTH the flat fields (tags 50-92) and the oneof (tags 200+)
  // may be populated. Consumers should prefer the oneof if set, falling back to
  // flat fields for backward compatibility. Writers should populate BOTH during
  // the dual-write period.
  //
  // Once all consumers have migrated to the oneof, the flat fields will be
  // deprecated and eventually removed in a major version bump.
  // ============================================================================
  oneof product_details {
    BondDetailsProto bond_details = 200;
    TipsDetailsProto tips_details = 201;
    FrnDetailsProto frn_details = 202;
    IndexDetailsProto index_details = 203;
    EquityDetailsProto equity_details = 204;
    CashDetailsProto cash_details = 205;
    FxSpotDetailsProto fx_spot_details = 206;
  }
}

// Bond security details: fixed-rate coupon bonds (US Treasuries, corporates, etc.)
message BondDetailsProto {
  fintekkers.models.util.DecimalValueProto coupon_rate = 1; // Expressed as a decimal fraction (0.05=5%, 0.0075=0.75%). Do NOT use percentage form (5.0 will be rejected).
  CouponTypeProto coupon_type = 2;
  CouponFrequencyProto coupon_frequency = 3;
  fintekkers.models.util.LocalDateProto dated_date = 4;
  fintekkers.models.util.DecimalValueProto face_value = 5;
  fintekkers.models.util.LocalDateProto issue_date = 6;
  fintekkers.models.util.LocalDateProto maturity_date = 7;
  repeated fintekkers.models.security.bond.IssuanceProto issuance_info = 8;
}

// TIPS (Treasury Inflation-Protected Securities) details.
// Extends bond fields with inflation-indexing information.
message TipsDetailsProto {
  // Shared bond fields
  fintekkers.models.util.DecimalValueProto coupon_rate = 1;
  CouponTypeProto coupon_type = 2;
  CouponFrequencyProto coupon_frequency = 3;
  fintekkers.models.util.LocalDateProto dated_date = 4;
  fintekkers.models.util.DecimalValueProto face_value = 5;
  fintekkers.models.util.LocalDateProto issue_date = 6;
  fintekkers.models.util.LocalDateProto maturity_date = 7;
  repeated fintekkers.models.security.bond.IssuanceProto issuance_info = 8;

  // TIPS-specific fields
  fintekkers.models.util.DecimalValueProto base_cpi = 10; //Reference CPI at bond issuance (e.g. 256.394)
  fintekkers.models.util.LocalDateProto index_date = 11; //The date the base CPI was observed
  fintekkers.models.security.index.IndexTypeProto inflation_index_type = 12; //Which inflation index (e.g. CPI_U)
}

// Floating Rate Note (FRN) details.
// Extends bond fields with floating-rate-specific information.
message FrnDetailsProto {
  // Shared bond fields
  fintekkers.models.util.DecimalValueProto coupon_rate = 1; // Unused for FRN (rate is computed from reference_rate + spread). If set, must be in decimal form (0.05=5%).
  CouponTypeProto coupon_type = 2;
  CouponFrequencyProto coupon_frequency = 3;
  fintekkers.models.util.LocalDateProto dated_date = 4;
  fintekkers.models.util.DecimalValueProto face_value = 5;
  fintekkers.models.util.LocalDateProto issue_date = 6;
  fintekkers.models.util.LocalDateProto maturity_date = 7;
  repeated fintekkers.models.security.bond.IssuanceProto issuance_info = 8;

  // FRN-specific fields
  fintekkers.models.util.DecimalValueProto spread = 10; //Fixed spread over the reference rate, in basis points
  fintekkers.models.security.index.IndexTypeProto reference_rate_index = 11; //Which floating rate benchmark (e.g. SOFR)
  CouponFrequencyProto reset_frequency = 12; //How often the floating coupon rate resets
}

// Index security details (e.g. CPI-U, SOFR index).
message IndexDetailsProto {
  fintekkers.models.security.index.IndexTypeProto index_type = 1;
}

// Equity security details. Minimal for now — placeholder for future fields
// (e.g. shares_outstanding, dividend_yield, sector).
message EquityDetailsProto {
  // No equity-specific fields exist yet. This message serves as a type marker
  // in the oneof and a home for future equity-specific fields.
}

// Cash security details.
message CashDetailsProto {
  string cash_id = 1; //e.g. "USD", "EUR", "GBP"
}

// FX spot pair details.
// Represents a spot foreign exchange rate between two currencies.
// The pair is expressed as: price = units of quote_currency per 1 unit of base_currency.
// Example: USD/GBP with convention UNITS_OF_QUOTE_PER_BASE means the price is
// "how many GBP you receive for 1 USD" (e.g. 0.79).
message FxSpotDetailsProto {
  SecurityProto base_currency = 1;  //The currency being bought/sold (e.g. USD cash security). Must be a CashDetailsProto with is_link=true.
  SecurityProto quote_currency = 2; //The currency in which the price is expressed (e.g. GBP cash security). Must be a CashDetailsProto with is_link=true.
  string convention = 3;            //Quoting convention — always "UNITS_OF_QUOTE_PER_BASE" for spot FX (ISO standard)
}
