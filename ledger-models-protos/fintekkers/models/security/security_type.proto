syntax = "proto3";

package fintekkers.models.security;

option java_multiple_files = true;

option java_outer_classname = "SecurityTypeProtos";

enum SecurityTypeProto {
  UNKNOWN_SECURITY_TYPE = 0; //Maps to Security
  CASH_SECURITY = 1;
  EQUITY_SECURITY = 2;
  BOND_SECURITY = 3;
  TIPS = 4;
  FRN = 5;
  INDEX_SECURITY = 6;
  FX_SPOT = 7;
  EQUITY_INDEX_SECURITY = 8;  // Equity market indices (DJIA, S&P 500, Nasdaq-100, etc.)
  BANK_LOAN = 9;
  FUTURES_CONTRACT = 10;
  CERTIFICATE_OF_DEPOSIT = 11;
}
