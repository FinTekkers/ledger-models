syntax = "proto3";

package fintekkers.models.position;

import "fintekkers/models/position/position_util.proto";
import "fintekkers/models/security/security.proto";

option java_multiple_files = true;
option java_outer_classname = "PositionProtos";

enum PositionViewProto {
  UNKNOWN_POSITION_VIEW = 0;
  DEFAULT_VIEW = 1;
  STRATEGY_VIEW = 2;
}

enum PositionTypeProto {
  UNKNOWN_POSITION_TYPE = 0;
  TRANSACTION = 1;
  TAX_LOT = 2;
}

message PositionProto {
  string object_class = 1;
  string version = 2;

  PositionViewProto position_view = 10;
  PositionTypeProto position_type = 11;

  repeated MeasureMapEntry measures = 20;
  repeated FieldMapEntry fields = 21;

  // The base/reporting currency for monetary measures in this position.
  // Set to the portfolio's base currency (e.g. USD cash security).
  // Allows the UI to display the currency alongside MARKET_VALUE and other measures.
  fintekkers.models.security.SecurityProto reporting_currency = 22;
}
